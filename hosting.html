<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>informationbank.com — For Sale</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #0e0e0e;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(200,175,120,0.12) 0%, transparent 70%);
      font-family: 'DM Sans', sans-serif;
      color: #e8e0d0;
      padding: 2rem;
    }

    .card {
      text-align: center;
      max-width: 540px;
      width: 100%;
      animation: fadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #8a7a5a;
      margin-bottom: 1.5rem;
      font-weight: 400;
    }

    .domain {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 7vw, 3.4rem);
      color: #f0e6cc;
      letter-spacing: -0.01em;
      line-height: 1.1;
      margin-bottom: 0.5rem;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #c8af78, transparent);
      margin: 1.75rem auto;
    }

    .message {
      font-size: 1.05rem;
      font-weight: 300;
      color: #b0a48a;
      line-height: 1.7;
      margin-bottom: 2rem;
    }

    .contact-link {
      display: inline-block;
      font-size: 0.95rem;
      font-weight: 500;
      color: #0e0e0e;
      background: #c8af78;
      text-decoration: none;
      padding: 0.75rem 2rem;
      border-radius: 2px;
      letter-spacing: 0.02em;
      transition: background 0.2s, transform 0.15s;
    }

    .contact-link:hover {
      background: #dfc88e;
      transform: translateY(-1px);
    }

    .contact-link:active {
      transform: translateY(0);
    }

    .footer-note {
      margin-top: 2.5rem;
      font-size: 12px;
      color: #4a4438;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="eyebrow">Premium Domain</p>
    <h1 class="domain">www.informationbank.com</h1>
    <div class="divider"></div>
    <p class="message">This domain is available for purchase.<br>Interested parties are welcome to reach out.</p>
    <a class="contact-link" href="mailto:gard.little@rcn.com">Contact Us to Inquire</a>
    <p class="footer-note">gard.little@rcn.com</p>
  </div>
</body>
</html>
